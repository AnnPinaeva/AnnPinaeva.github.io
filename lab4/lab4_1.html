<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление вертикального меню</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            background: #f0f0f0; 
        }
        
        .menu {
            width: 200px;
            background: #9b59b6;
        }
        
        .menu ul {
            list-style: none;
            margin: 0;
            padding: 5px 10px;
        }
        
        .menu li {
            padding: 5px 0;
        }
        
        .menu li a {
            display: block;
            padding: 10px;
            text-transform: uppercase;
            text-decoration: none;
            background: #e8daef;
            color: #6c3483;
            font-family: Arial, sans-serif;
        }
        
        .menu li a:hover {
            background: #d2b4de;
            color: #4a235a;
        }
    </style>
</head>
<body>

<nav class="menu">
    <ul>
        <li><a href="#">Фильмы</a></li>
        <li><a href="#">Музыка</a></li>
        <li><a href="#">Софт</a></li>
        <li><a href="#">Игры</a></li>
    </ul>
</nav>

</body>
</html>
