<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблицы</title>
    <style>
        table {
            width: 300px;
            border: 3px solid black;
            margin: 20px;
            float: left;
            border-collapse: collapse;
        }
        td, th {
            border: 3px solid black;
            padding: 30px;
            font-weight: bold;
        }
        caption {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table>
        <caption>1 таблица</caption>
        <tbody>
            <tr>
                <th>1</th>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <th>4</th>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>
    </table>

    <table>
        <caption>2 таблица</caption>
        <tbody>
            <tr>
                <th>1</th>
                <th>2</th>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>
    </table>

    <table>
        <caption>3 таблица</caption>
        <tbody>
            <tr>
                <th>1</th>
                <td>2</td>
            </tr>
            <tr>
                <th>3</th>
                <td>4</td>
            </tr>
            <tr>
                <th>5</th>
                <td>6</td>
            </tr>
        </tbody>
    </table>

    <table>
        <caption>4 таблица</caption>
        <tbody>
            <tr>
                <td colspan="2" style="background-color: pink;">1</td>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td colspan="2">5</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
