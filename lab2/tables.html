<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таблицы</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px;
        }
        td, th {
            border: 1px solid black;
            padding: 30px 40px;
            text-align: center;
        }
        th {
            background-color: #f0f0f0;
        }
        caption {
            margin-bottom: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Четыре таблицы</h1>

    <!-- Только первая таблица -->
    <table>
        <caption>Таблица 1</caption>
        <tr>
            <th rowspan="2">1</th>
            <td colspan="2">2</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>

</body>
</html>
