<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Четыре таблицы</title>
    <style>
        body {
            background-color: #fff;
        }
        table {
            border-collapse: collapse;
            margin: 20px;
        }
        table:not(:last-child) td, table:not(:last-child) th {
            border: 1px solid #eee;
            padding: 20px;
            text-align: center;
        }
        table:not(:last-child) th {
            background-color: #ffe6f0;
            font-weight: bold;
        }
        caption {
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        table:last-child td {
            border: 2px solid black;
            padding: 20px;
            text-align: center;
        }
        table:last-child .bold-text {
            font-weight: bold;
        }
        table:last-child .pink-bg {
            background-color: pink;
        }
    </style>
</head>
<body>

    <h1>Четыре таблицы</h1>

    <table>
        <caption>Таблица 1</caption>
        <tr>
            <th rowspan="2">1</th>
            <td colspan="2">2</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>

    <table>
        <caption>Таблица 2</caption>
        <tr>
            <th colspan="2" rowspan="2">1</th>
        </tr>
        <tr></tr>
        <tr>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>6</td>
        </tr>
    </table>

    <table>
        <caption>Таблица 3</caption>
        <tr>
            <td>1</td>
            <td rowspan="2">2</td>
        </tr>
        <tr>
            <td>3</td>
        </tr>
        <tr>
            <td colspan="2">5</td>
        </tr>
    </table>

    <table>
        <caption>Таблица 4</caption>
        <tr>
            <td class="pink-bg bold-text" colspan="2">1</td>
        </tr>
        <tr>
            <td class="bold-text">3</td>
            <td class="bold-text">4</td>
        </tr>
        <tr>
            <td class="bold-text" colspan="2">5</td>
        </tr>
    </table>

</body>
</html>
