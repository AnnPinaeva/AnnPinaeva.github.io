<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фреймы</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .frame-container {
            display: flex;
            height: 100vh;
        }
        iframe {
            border: none;
            height: 100%;
        }
        .menu {
            width: 200px;
        }
        .content {
            width: 800px;
        }
    </style>
</head>
<body>
    <div class="frame-container">
        <iframe class="menu" src="iframes/menu.html" name="menu"></iframe>
        <iframe class="content" src="iframes/index.html" name="content"></iframe>
    </div>
</body>
</html>
